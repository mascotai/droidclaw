name: Migrate Secrets to Infisical (ONE-TIME)

# This workflow copies GitHub Actions secrets from this repo to Infisical.
# Run it ONCE via workflow_dispatch, then DELETE this file.

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      INFISICAL_DOMAIN: https://secrets.stack.mascott.ai
      INFISICAL_PROJECT_ID: f6753b26-c4ae-476c-a388-1a3cf56a7c0b
      INFISICAL_ENV_SLUG: prod
    steps:
      - name: Authenticate with Infisical (Universal Auth)
        run: |
          set -euo pipefail

          RESPONSE=$(curl -sS -X POST "${INFISICAL_DOMAIN}/api/v1/auth/universal-auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"clientId\": \"${{ secrets.INFISICAL_CLIENT_ID }}\", \"clientSecret\": \"${{ secrets.INFISICAL_CLIENT_SECRET }}\"}")

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.accessToken // empty')

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Failed to authenticate with Infisical: $(echo "$RESPONSE" | jq -r '.message // .error // "unknown error"')"
            exit 1
          fi

          echo "::add-mask::${ACCESS_TOKEN}"
          echo "INFISICAL_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"
          echo "✅ Authenticated with Infisical"

      - name: Create secrets in Infisical
        env:
          SECRET_INFRA_DEPLOY_TOKEN: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          SECRET_KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          SECRET_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SECRET_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SECRET_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          create_secret() {
            local name="$1"
            local value="$2"

            if [ -z "$value" ]; then
              echo "⚠️  Skipping $name (empty value)"
              return
            fi

            # Check if secret already exists
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${INFISICAL_TOKEN}" \
              "${INFISICAL_DOMAIN}/api/v3/secrets/raw/${name}?workspaceId=${INFISICAL_PROJECT_ID}&environment=${INFISICAL_ENV_SLUG}&secretPath=/")

            if [ "$STATUS" = "200" ]; then
              echo "🔄 Updating existing secret: $name"
              curl -sS -X PATCH \
                -H "Authorization: Bearer ${INFISICAL_TOKEN}" \
                -H "Content-Type: application/json" \
                "${INFISICAL_DOMAIN}/api/v3/secrets/raw/${name}" \
                -d "{
                  \"workspaceId\": \"${INFISICAL_PROJECT_ID}\",
                  \"environment\": \"${INFISICAL_ENV_SLUG}\",
                  \"secretPath\": \"/\",
                  \"secretValue\": $(echo -n "$value" | jq -Rs .)
                }" | jq -r '.secret.secretKey // "error"'
            else
              echo "➕ Creating secret: $name"
              curl -sS -X POST \
                -H "Authorization: Bearer ${INFISICAL_TOKEN}" \
                -H "Content-Type: application/json" \
                "${INFISICAL_DOMAIN}/api/v3/secrets/raw/${name}" \
                -d "{
                  \"workspaceId\": \"${INFISICAL_PROJECT_ID}\",
                  \"environment\": \"${INFISICAL_ENV_SLUG}\",
                  \"secretPath\": \"/\",
                  \"secretValue\": $(echo -n "$value" | jq -Rs .)
                }" | jq -r '.secret.secretKey // "error"'
            fi
          }

          echo "🚀 Migrating 5 secrets to Infisical..."
          echo ""

          create_secret "SEISMIC_INFRA_DEPLOY_TOKEN" "$SECRET_INFRA_DEPLOY_TOKEN"
          create_secret "SEISMIC_KEYSTORE_BASE64"    "$SECRET_KEYSTORE_BASE64"
          create_secret "SEISMIC_KEYSTORE_PASSWORD"  "$SECRET_KEYSTORE_PASSWORD"
          create_secret "SEISMIC_KEY_ALIAS"          "$SECRET_KEY_ALIAS"
          create_secret "SEISMIC_KEY_PASSWORD"        "$SECRET_KEY_PASSWORD"

          echo ""
          echo "✅ Migration complete! You can now delete this workflow file."
