name: Build & Push DroidClaw Images

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: droidclaw-server
            context: .
            dockerfile: Dockerfile.server
          - service: droidclaw-web
            context: ./web-react
            dockerfile: web-react/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.ref == 'refs/heads/main' && 'latest' || 'dev' }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}:sha-${{ github.sha }}

  trigger-deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger service deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          repository: ${{ github.repository_owner }}/mascotai-stack
          event-type: deploy-service
          client-payload: |
            {
              "services": "droidclaw-server,droidclaw-web",
              "compose_file": "apps/droidclaw.yml",
              "project": "${{ github.ref == 'refs/heads/main' && 'mascotai-prod' || 'mascotai-dev' }}",
              "infisical_env": "${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}",
              "triggered_by": "${{ github.repository }}",
              "commit_sha": "${{ github.sha }}"
            }
