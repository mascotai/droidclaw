name: Extract Keystore Secrets

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Output secrets as artifacts
        run: |
          echo "$KEYSTORE_BASE64" > /tmp/keystore_base64.txt
          echo "$KEYSTORE_PASSWORD" > /tmp/keystore_password.txt
          echo "$KEY_ALIAS" > /tmp/key_alias.txt
          echo "$KEY_PASSWORD" > /tmp/key_password.txt
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload secrets
        uses: actions/upload-artifact@v4
        with:
          name: keystore-secrets
          path: /tmp/keystore_*.txt
          retention-days: 1
